<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz: Array Methods — RunJS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-lesson-id="9">
  <main class="lesson-stage">
    <h2>Mastery Check: Array Methods</h2>

    <div class="quiz-block">
      <div class="quiz-q">1. Which method returns a NEW array with transformed items?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="0" data-correct="false">forEach</button>
        <button class="quiz-option" data-q="0" data-correct="true">map</button>
        <button class="quiz-option" data-q="0" data-correct="false">reduce</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">2. What does <code>[1,2,3].filter(n => n > 1)</code> return?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="1" data-correct="false">[1]</button>
        <button class="quiz-option" data-q="1" data-correct="true">[2, 3]</button>
        <button class="quiz-option" data-q="1" data-correct="false">2</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">3. Why pass initial value to <code>reduce</code>?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="2" data-correct="false">It's optional, just for style</button>
        <button class="quiz-option" data-q="2" data-correct="true">Prevents crash on empty array</button>
        <button class="quiz-option" data-q="2" data-correct="false">Makes it run faster</button>
      </div>
    </div>

    <div id="quiz-feedback"></div>
  </main>

  <script>
    let score = 0;
    const totalQ = 3;
    const answered = new Set();

    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.onclick = () => {
        const q = btn.dataset.q;
        if (answered.has(q)) return;
        answered.add(q);

        const correct = btn.dataset.correct === 'true';
        btn.style.borderColor = correct? '#22c55e' : '#ef4444';

        if (correct) score++;

        if (answered.size === totalQ) {
          const feedback = document.getElementById('quiz-feedback');
          if (score === totalQ) {
            feedback.innerHTML = `<div class="success">Perfect! ${score}/${totalQ} · +50 XP · Lesson Mastered!</div>`;
            const completed = JSON.parse(localStorage.getItem('runjs_completed') || '[]');
            if (!completed.includes(9)) {
              completed.push(9);
              localStorage.setItem('runjs_completed', JSON.stringify(completed));
              localStorage.setItem('runjs_xp', (parseInt(localStorage.getItem('runjs_xp') || '0') + 50));
            }
            setTimeout(() => location.href = '/lesson-10.html', 2000);
          } else {
            feedback.innerHTML = `<div class="error">You got ${score}/${totalQ}. Review notes and try again.</div>
            <a href="/lesson-09.html" class="btn btn-primary" style="margin-top:12px">Review Notes</a>`;
          }
        }
      };
    });
  </script>
</body>
</html>
