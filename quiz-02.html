<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz: Functions — RunJS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-lesson-id="2">
  <main class="lesson-stage">
    <h2>Mastery Check: Functions</h2>
    
    <div class="quiz-block">
      <div class="quiz-q">1. What does a function return if it has no <code>return</code> statement?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="0" data-correct="false">null</button>
        <button class="quiz-option" data-q="0" data-correct="true">undefined</button>
        <button class="quiz-option" data-q="0" data-correct="false">0</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">2. Which is an arrow function?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="1" data-correct="false">function add() {}</button>
        <button class="quiz-option" data-q="1" data-correct="true">const add = (a,b) => a + b</button>
        <button class="quiz-option" data-q="1" data-correct="false">const add = function() {}</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">3. What are the values passed when calling a function called?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="2" data-correct="false">Parameters</button>
        <button class="quiz-option" data-q="2" data-correct="true">Arguments</button>
        <button class="quiz-option" data-q="2" data-correct="false">Inputs</button>
      </div>
    </div>

    <div id="quiz-feedback"></div>
  </main>

  <script>
    let score = 0;
    const totalQ = 3;
    const answered = new Set();

    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.onclick = () => {
        const q = btn.dataset.q;
        if (answered.has(q)) return;
        answered.add(q);
        
        const correct = btn.dataset.correct === 'true';
        btn.style.borderColor = correct ? '#22c55e' : '#ef4444';
        
        if (correct) score++;
        
        if (answered.size === totalQ) {
          const feedback = document.getElementById('quiz-feedback');
          if (score === totalQ) {
            feedback.innerHTML = `<div class="success">Perfect! ${score}/${totalQ} · +30 XP · Lesson Mastered!</div>`;
            const completed = JSON.parse(localStorage.getItem('runjs_completed') || '[]');
            if (!completed.includes(2)) {
              completed.push(2);
              localStorage.setItem('runjs_completed', JSON.stringify(completed));
              localStorage.setItem('runjs_xp', (parseInt(localStorage.getItem('runjs_xp') || '0') + 30));
            }
            setTimeout(() => location.href = '/lesson-03.html', 2000);
          } else {
            feedback.innerHTML = `<div class="error">You got ${score}/${totalQ}. Review notes and try again.</div>
            <a href="/lesson-02.html" class="btn btn-primary" style="margin-top:12px">Review Notes</a>`;
          }
        }
      };
    });
  </script>
</body>
</html>
