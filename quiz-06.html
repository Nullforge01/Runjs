<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz: Objects — RunJS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-lesson-id="6">
  <main class="lesson-stage">
    <h2>Mastery Check: Objects</h2>

    <div class="quiz-block">
      <div class="quiz-q">1. How do you access property <code>age</code> from object <code>user</code>?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="0" data-correct="false">user[age]</button>
        <button class="quiz-option" data-q="0" data-correct="true">user.age</button>
        <button class="quiz-option" data-q="0" data-correct="false">user->age</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">2. What keyword refers to the current object inside a method?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="1" data-correct="false">self</button>
        <button class="quiz-option" data-q="1" data-correct="true">this</button>
        <button class="quiz-option" data-q="1" data-correct="false">me</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">3. What's the result? <code>const obj = {a:1}; obj.b = 2; delete obj.a;</code> Final object?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="2" data-correct="false">{a:1, b:2}</button>
        <button class="quiz-option" data-q="2" data-correct="true">{b:2}</button>
        <button class="quiz-option" data-q="2" data-correct="false">{}</button>
      </div>
    </div>

    <div id="quiz-feedback"></div>
  </main>

  <script>
    let score = 0;
    const totalQ = 3;
    const answered = new Set();

    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.onclick = () => {
        const q = btn.dataset.q;
        if (answered.has(q)) return;
        answered.add(q);

        const correct = btn.dataset.correct === 'true';
        btn.style.borderColor = correct? '#22c55e' : '#ef4444';

        if (correct) score++;

        if (answered.size === totalQ) {
          const feedback = document.getElementById('quiz-feedback');
          if (score === totalQ) {
            feedback.innerHTML = `<div class="success">Perfect! ${score}/${totalQ} · +40 XP · Lesson Mastered!</div>`;
            const completed = JSON.parse(localStorage.getItem('runjs_completed') || '[]');
            if (!completed.includes(6)) {
              completed.push(6);
              localStorage.setItem('runjs_completed', JSON.stringify(completed));
              localStorage.setItem('runjs_xp', (parseInt(localStorage.getItem('runjs_xp') || '0') + 40));
            }
            setTimeout(() => location.href = '/lesson-07.html', 2000);
          } else {
            feedback.innerHTML = `<div class="error">You got ${score}/${totalQ}. Review notes and try again.</div>
            <a href="/lesson-06.html" class="btn btn-primary" style="margin-top:12px">Review Notes</a>`;
          }
        }
      };
    });
  </script>
</body>
</html>
