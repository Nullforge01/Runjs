<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz: Events — RunJS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-lesson-id="8">
  <main class="lesson-stage">
    <h2>Mastery Check: Events & Forms</h2>

    <div class="quiz-block">
      <div class="quiz-q">1. What stops a form from reloading the page on submit?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="0" data-correct="false">return false</button>
        <button class="quiz-option" data-q="0" data-correct="true">e.preventDefault()</button>
        <button class="quiz-option" data-q="0" data-correct="false">e.stop()</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">2. Which event fires every time user types in an input?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="1" data-correct="false">change</button>
        <button class="quiz-option" data-q="1" data-correct="true">input</button>
        <button class="quiz-option" data-q="1" data-correct="false">keydown</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">3. How do you get text from <code>&lt;input id="user"&gt;</code>?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="2" data-correct="false">document.getElementById("user").text</button>
        <button class="quiz-option" data-q="2" data-correct="true">document.getElementById("user").value</button>
        <button class="quiz-option" data-q="2" data-correct="false">document.getElementById("user").textContent</button>
      </div>
    </div>

    <div id="quiz-feedback"></div>
  </main>

  <script>
    let score = 0;
    const totalQ = 3;
    const answered = new Set();

    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.onclick = () => {
        const q = btn.dataset.q;
        if (answered.has(q)) return;
        answered.add(q);

        const correct = btn.dataset.correct === 'true';
        btn.style.borderColor = correct? '#22c55e' : '#ef4444';

        if (correct) score++;

        if (answered.size === totalQ) {
          const feedback = document.getElementById('quiz-feedback');
          if (score === totalQ) {
            feedback.innerHTML = `<div class="success">Perfect! ${score}/${totalQ} · +45 XP · Lesson Mastered!</div>`;
            const completed = JSON.parse(localStorage.getItem('runjs_completed') || '[]');
            if (!completed.includes(8)) {
              completed.push(8);
              localStorage.setItem('runjs_completed', JSON.stringify(completed));
              localStorage.setItem('runjs_xp', (parseInt(localStorage.getItem('runjs_xp') || '0') + 45));
            }
            setTimeout(() => location.href = '/lesson-09.html', 2000);
          } else {
            feedback.innerHTML = `<div class="error">You got ${score}/${totalQ}. Review notes and try again.</div>
            <a href="/lesson-08.html" class="btn btn-primary" style="margin-top:12px">Review Notes</a>`;
          }
        }
      };
    });
  </script>
</body>
</html>
