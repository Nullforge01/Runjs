<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz: Final Project — RunJS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-lesson-id="12">
  <main class="lesson-stage">
    <h2>Mastery Check: Final Project Concepts</h2>

    <div class="quiz-block">
      <div class="quiz-q">1. Why use event delegation for todo delete buttons?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="0" data-correct="false">It's required by browsers</button>
        <button class="quiz-option" data-q="0" data-correct="true">Works for dynamically added todos, one listener</button>
        <button class="quiz-option" data-q="0" data-correct="false">Makes code run faster</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">2. What's the best way to generate unique todo IDs?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="1" data-correct="false">Math.random()</button>
        <button class="quiz-option" data-q="1" data-correct="true">Date.now()</button>
        <button class="quiz-option" data-q="1" data-correct="false">todos.length</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">3. When should you call render() in your todo app?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="2" data-correct="false">Only on page load</button>
        <button class="quiz-option" data-q="2" data-correct="true">After any change to todos array</button>
        <button class="quiz-option" data-q="2" data-correct="false">Every second with setInterval</button>
      </div>
    </div>

    <div id="quiz-feedback"></div>
  </main>

  <script>
    let score = 0;
    const totalQ = 3;
    const answered = new Set();

    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.onclick = () => {
        const q = btn.dataset.q;
        if (answered.has(q)) return;
        answered.add(q);

        const correct = btn.dataset.correct === 'true';
        btn.style.borderColor = correct? '#22c55e' : '#ef4444';

        if (correct) score++;

        if (answered.size === totalQ) {
          const feedback = document.getElementById('quiz-feedback');
          if (score === totalQ) {
            feedback.innerHTML = `<div class="success">Perfect! ${score}/${totalQ} · +100 XP · COURSE COMPLETE!</div>`;
            const completed = JSON.parse(localStorage.getItem('runjs_completed') || '[]');
            if (!completed.includes(12)) {
              completed.push(12);
              localStorage.setItem('runjs_completed', JSON.stringify(completed));
              localStorage.setItem('runjs_xp', (parseInt(localStorage.getItem('runjs_xp') || '0') + 100));
            }
            setTimeout(() => location.href = '/certificate.html', 2500);
          } else {
            feedback.innerHTML = `<div class="error">You got ${score}/${totalQ}. Review and try again.</div>
            <a href="/lesson-12.html" class="btn btn-primary" style="margin-top:12px">Review Project Spec</a>`;
          }
        }
      };
    });
  </script>
</body>
</html>
