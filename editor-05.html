<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Code: Arrays — RunJS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-lesson-id="5">
  <main class="lesson-stage">
    <div class="lesson-header">
      <h2>Challenge: Arrays</h2>
      <a href="/lesson-05.html" class="btn btn-ghost">← Read Notes Again</a>
    </div>

    <div class="challenge-desc">
      <p><strong>Task:</strong> Create a function <code>getFirstAndLast</code> that:</p>
      <ol>
        <li>Takes an array <code>arr</code></li>
        <li>Returns a new array with only the first and last items</li>
        <li>If array has 1 item, return that item twice</li>
      </ol>
      <p>Example: <code>getFirstAndLast([1,2,3,4])</code> → <code>[1,4]</code></p>
    </div>

    <div id="editor" style="height:350px;border:1px solid var(--border);margin:16px 0;"></div>

    <div class="editor-actions">
      <button id="run-code" class="btn btn-primary">Run Tests</button>
      <button id="show-hint" class="btn btn-ghost">Show Hint</button>
    </div>
    <div id="test-results"></div>
    <div id="hint-box" style="display:none;margin-top:12px;"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs/loader.js"></script>
  <script>
    const lesson = {
      id: 5,
      starterCode: "// Create function getFirstAndLast(arr)\n// Return [first, last] from the array\n\n",
      solution: "function getFirstAndLast(arr) {\n return [arr[0], arr[arr.length - 1]];\n}",
      hints: [
        "First item: arr[0]",
        "Last item: arr[arr.length - 1]",
        "Return them in a new array: return [first, last];"
      ]
    };

    require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.45.0/min/vs' }});
    require(['vs/editor/editor.main'], () => {
      window.editor = monaco.editor.create(document.getElementById('editor'), {
        value: lesson.starterCode,
        language: 'javascript',
        theme: 'vs-dark',
        automaticLayout: true
      });
    });

    let hintIndex = 0;
    document.getElementById('show-hint').onclick = () => {
      const box = document.getElementById('hint-box');
      box.style.display = 'block';
      box.innerHTML = `<div class="hint">💡 Hint ${hintIndex+1}: ${lesson.hints[hintIndex]}</div>`;
      hintIndex = (hintIndex + 1) % lesson.hints.length;
    };

    document.getElementById('run-code').onclick = () => {
      const code = window.editor.getValue();
      let pass = true;
      let msg = '';
      try {
        const userCode = new Function(code + '; return getFirstAndLast;');
        const getFirstAndLast = userCode();
        const t1 = getFirstAndLast([1,2,3,4]);
        const t2 = getFirstAndLast(['a']);
        const t3 = getFirstAndLast([5,10]);

        if (typeof getFirstAndLast!== 'function') { pass = false; msg = 'getFirstAndLast should be a function'; }
        else if (JSON.stringify(t1)!== '[1,4]') { pass = false; msg = '[1,2,3,4] should return [1,4]'; }
        else if (JSON.stringify(t2)!== '["a","a"]') { pass = false; msg = '["a"] should return ["a","a"]'; }
        else if (JSON.stringify(t3)!== '[5,10]') { pass = false; msg = '[5,10] should return [5,10]'; }
      } catch(e) {
        pass = false; msg = e.message;
      }

      if (pass) {
        document.getElementById('test-results').innerHTML = '<div class="success">All tests passed! ✓</div>';
        setTimeout(() => location.href = '/quiz-05.html', 1200);
      } else {
        document.getElementById('test-results').innerHTML = `<div class="error">Failed: ${msg}</div>`;
      }
    };
  </script>
</body>
</html>
