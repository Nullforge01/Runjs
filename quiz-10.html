<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz: Async JS — RunJS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-lesson-id="10">
  <main class="lesson-stage">
    <h2>Mastery Check: Async JS & Promises</h2>

    <div class="quiz-block">
      <div class="quiz-q">1. What does <code>await</code> do?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="0" data-correct="false">Starts a new thread</button>
        <button class="quiz-option" data-q="0" data-correct="true">Pauses function until Promise resolves</button>
        <button class="quiz-option" data-q="0" data-correct="false">Makes code run faster</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">2. How do you handle errors in async/await?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="1" data-correct="false">.catch()</button>
        <button class="quiz-option" data-q="1" data-correct="true">try/catch</button>
        <button class="quiz-option" data-q="1" data-correct="false">if (error)</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">3. What does <code>fetch(url)</code> return?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="2" data-correct="false">JSON data directly</button>
        <button class="quiz-option" data-q="2" data-correct="true">Promise of Response object</button>
        <button class="quiz-option" data-q="2" data-correct="false">String</button>
      </div>
    </div>

    <div id="quiz-feedback"></div>
  </main>

  <script>
    let score = 0;
    const totalQ = 3;
    const answered = new Set();

    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.onclick = () => {
        const q = btn.dataset.q;
        if (answered.has(q)) return;
        answered.add(q);

        const correct = btn.dataset.correct === 'true';
        btn.style.borderColor = correct? '#22c55e' : '#ef4444';

        if (correct) score++;

        if (answered.size === totalQ) {
          const feedback = document.getElementById('quiz-feedback');
          if (score === totalQ) {
            feedback.innerHTML = `<div class="success">Perfect! ${score}/${totalQ} · +60 XP · Lesson Mastered!</div>`;
            const completed = JSON.parse(localStorage.getItem('runjs_completed') || '[]');
            if (!completed.includes(10)) {
              completed.push(10);
              localStorage.setItem('runjs_completed', JSON.stringify(completed));
              localStorage.setItem('runjs_xp', (parseInt(localStorage.getItem('runjs_xp') || '0') + 60));
            }
            setTimeout(() => location.href = '/lesson-11.html', 2000);
          } else {
            feedback.innerHTML = `<div class="error">You got ${score}/${totalQ}. Review notes and try again.</div>
            <a href="/lesson-10.html" class="btn btn-primary" style="margin-top:12px">Review Notes</a>`;
          }
        }
      };
    });
  </script>
</body>
  </html>
