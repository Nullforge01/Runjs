<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz: Arrays — RunJS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-lesson-id="5">
  <main class="lesson-stage">
    <h2>Mastery Check: Arrays</h2>

    <div class="quiz-block">
      <div class="quiz-q">1. What's the index of the first element in an array?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="0" data-correct="false">1</button>
        <button class="quiz-option" data-q="0" data-correct="true">0</button>
        <button class="quiz-option" data-q="0" data-correct="false">-1</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">2. Which method adds an item to the end of an array?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="1" data-correct="false">shift()</button>
        <button class="quiz-option" data-q="1" data-correct="false">unshift()</button>
        <button class="quiz-option" data-q="1" data-correct="true">push()</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">3. For <code>const arr = [10,20,30]</code>, what is <code>arr.length - 1</code>?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="2" data-correct="false">3</button>
        <button class="quiz-option" data-q="2" data-correct="true">2</button>
        <button class="quiz-option" data-q="2" data-correct="false">30</button>
      </div>
    </div>

    <div id="quiz-feedback"></div>
  </main>

  <script>
    let score = 0;
    const totalQ = 3;
    const answered = new Set();

    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.onclick = () => {
        const q = btn.dataset.q;
        if (answered.has(q)) return;
        answered.add(q);

        const correct = btn.dataset.correct === 'true';
        btn.style.borderColor = correct? '#22c55e' : '#ef4444';

        if (correct) score++;

        if (answered.size === totalQ) {
          const feedback = document.getElementById('quiz-feedback');
          if (score === totalQ) {
            feedback.innerHTML = `<div class="success">Perfect! ${score}/${totalQ} · +35 XP · Lesson Mastered!</div>`;
            const completed = JSON.parse(localStorage.getItem('runjs_completed') || '[]');
            if (!completed.includes(5)) {
              completed.push(5);
              localStorage.setItem('runjs_completed', JSON.stringify(completed));
              localStorage.setItem('runjs_xp', (parseInt(localStorage.getItem('runjs_xp') || '0') + 35));
            }
            setTimeout(() => location.href = '/lesson-06.html', 2000);
          } else {
            feedback.innerHTML = `<div class="error">You got ${score}/${totalQ}. Review notes and try again.</div>
            <a href="/lesson-05.html" class="btn btn-primary" style="margin-top:12px">Review Notes</a>`;
          }
        }
      };
    });
  </script>
</body>
</html>
