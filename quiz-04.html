<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz: Loops — RunJS</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-lesson-id="4">
  <main class="lesson-stage">
    <h2>Mastery Check: Loops</h2>
    
    <div class="quiz-block">
      <div class="quiz-q">1. How many times does this run? <code>for(let i=0; i<3; i++){}</code></div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="0" data-correct="false">2</button>
        <button class="quiz-option" data-q="0" data-correct="true">3</button>
        <button class="quiz-option" data-q="0" data-correct="false">4</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">2. Which loop is best for going through every item in an array?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="1" data-correct="false">while</button>
        <button class="quiz-option" data-q="1" data-correct="true">for...of</button>
        <button class="quiz-option" data-q="1" data-correct="false">switch</button>
      </div>
    </div>

    <div class="quiz-block">
      <div class="quiz-q">3. What does <code>break</code> do inside a loop?</div>
      <div class="quiz-options">
        <button class="quiz-option" data-q="2" data-correct="false">Skips current iteration</button>
        <button class="quiz-option" data-q="2" data-correct="true">Exits the loop completely</button>
        <button class="quiz-option" data-q="2" data-correct="false">Pauses the loop</button>
      </div>
    </div>

    <div id="quiz-feedback"></div>
  </main>

  <script>
    let score = 0;
    const totalQ = 3;
    const answered = new Set();

    document.querySelectorAll('.quiz-option').forEach(btn => {
      btn.onclick = () => {
        const q = btn.dataset.q;
        if (answered.has(q)) return;
        answered.add(q);
        
        const correct = btn.dataset.correct === 'true';
        btn.style.borderColor = correct ? '#22c55e' : '#ef4444';
        
        if (correct) score++;
        
        if (answered.size === totalQ) {
          const feedback = document.getElementById('quiz-feedback');
          if (score === totalQ) {
            feedback.innerHTML = `<div class="success">Perfect! ${score}/${totalQ} · +35 XP · Lesson Mastered!</div>`;
            const completed = JSON.parse(localStorage.getItem('runjs_completed') || '[]');
            if (!completed.includes(4)) {
              completed.push(4);
              localStorage.setItem('runjs_completed', JSON.stringify(completed));
              localStorage.setItem('runjs_xp', (parseInt(localStorage.getItem('runjs_xp') || '0') + 35));
            }
            setTimeout(() => location.href = '/lesson-05.html', 2000);
          } else {
            feedback.innerHTML = `<div class="error">You got ${score}/${totalQ}. Review notes and try again.</div>
            <a href="/lesson-04.html" class="btn btn-primary" style="margin-top:12px">Review Notes</a>`;
          }
        }
      };
    });
  </script>
</body>
</html>
